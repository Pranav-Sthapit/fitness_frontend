<!--Section one-->
<div class="sections" [class.active]="step == 0">
  <div class="maincontainer" style="width: 400px">
    <h4 class="questiontext">Enter Your Age To Proceed</h4>
    <input type="text" [(ngModel)]="age" required />
    @if(ageError){
      <div class="error">{{ageError}}</div>
    }
    <div class="buttoncontainer">
      <button class="okbutton" type="button" (click)="next()">Next &gt;</button>
    </div>
  </div>
</div>

<!--Section two-->

<div class="sections" [class.active]="step == 1">
  <!--for childrens -->
  @if (ageNum < 18) {
    <app-children (goPrev)="prev()" />
  }

  <!--for adults-->
  @else if (ageNum <= 65) {
    <app-adults (goPrev)="prev()" />
  }

  <!--for old people-->
  @else {
    <app-seniors (goPrev)="prev()" />
  }
</div>

<!--Section three-->
